services:
  postgres:
    image: postgres:16-alpine
    container_name: appsueldo-postgres
    environment:
      POSTGRES_DB: appsueldo
      POSTGRES_USER: appsueldo
      POSTGRES_PASSWORD: appsueldo
    ports:
      - "5432:5432"
    volumes:
      - appsueldo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appsueldo -d appsueldo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  appsueldo_postgres_data:
